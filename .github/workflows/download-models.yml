name: 📦 Download & Upload AI Models

on:
  workflow_dispatch:
    inputs:
      models:
        description: 'Modèles à traiter'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - llm
          - emotion
          - whisper

# Permissions pour uploader des release assets
permissions:
  contents: write

jobs:
  # ── Qwen2.5-1.5B-Instruct (q4f16 ONNX) ──────────────────────────────────
  # FIX : remplace Llama-3.2-1B-Instruct. Ce job téléchargeait le graphe ONNX
  # (llm-model_q4.onnx, ~149 Ko) mais jamais son fichier de poids externe
  # model_q4.onnx_data (~1.69 Go) — l'app tentait donc de charger un modèle
  # tronqué. La quantification q4f16 de Qwen2.5-1.5B-Instruct est un fichier
  # .onnx unique et autonome (pas de .onnx_data externe), donc ce bug de
  # classe entière ne peut plus se reproduire. C'est aussi l'architecture
  # que LLMService.ts attend réellement côté app (num_hidden_layers=28,
  # num_key_value_heads=2, head_dim=128).
  upload-llm:
    name: "LLM — Qwen2.5-1.5B-Instruct (q4f16)"
    runs-on: ubuntu-latest
    if: ${{ inputs.models == 'all' || inputs.models == 'llm' }}
    steps:
      - name: Download Qwen2.5-1.5B-Instruct (q4f16) from HuggingFace
        run: |
          set -e
          BASE="https://huggingface.co/onnx-community/Qwen2.5-1.5B-Instruct/resolve/main"
          mkdir -p llm

          echo "⬇️  model_q4f16.onnx (~1.22 Go, fichier unique — pas de .onnx_data)…"
          wget --tries=5 --retry-connrefused --waitretry=10 \
               --timeout=120 --progress=bar:force \
               "$BASE/onnx/model_q4f16.onnx" -O llm/llm-model_q4f16.onnx

          echo "⬇️  Fichiers de configuration…"
          wget -q "$BASE/tokenizer.json"          -O llm/llm-tokenizer.json
          wget -q "$BASE/tokenizer_config.json"   -O llm/llm-tokenizer_config.json
          wget -q "$BASE/special_tokens_map.json" -O llm/llm-special_tokens_map.json
          wget -q "$BASE/config.json"             -O llm/llm-config.json
          wget -q "$BASE/generation_config.json"  -O llm/llm-generation_config.json

          echo "🔎 Vérifie qu'aucun fichier n'est un HTML d'erreur déguisé…"
          for f in llm/*; do
            if head -c 100 "$f" | grep -qi '<html'; then
              echo "❌ $f ressemble à une page d'erreur HTML, pas au fichier attendu" >&2
              exit 1
            fi
          done

          echo "✅ LLM téléchargé — taille:"
          du -sh llm/*

      - name: Upload LLM assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ai-models-v1 \
            llm/llm-model_q4f16.onnx \
            llm/llm-tokenizer.json \
            llm/llm-tokenizer_config.json \
            llm/llm-special_tokens_map.json \
            llm/llm-config.json \
            llm/llm-generation_config.json \
            --repo ${{ github.repository }} \
            --clobber
          echo "✅ LLM uploadé dans le release ai-models-v1"

          # Nettoyage des anciens assets Llama-3.2 (incomplets/obsolètes) pour
          # ne pas laisser un llm-model_q4.onnx cassé traîner dans la release.
          gh release delete-asset ai-models-v1 llm-model_q4.onnx --repo ${{ github.repository }} --yes || true

  # ── CamemBERT Emotions FR ─────────────────────────────────────────────────
  # NOTE : contrairement au LLM et à Whisper, il n'existe AUCUNE version ONNX
  # déjà convertie de ce modèle sur HuggingFace. On la convertit donc
  # nous-mêmes ici (via 🤗 Optimum), à partir du modèle PyTorch d'origine
  # astrosbd/french_emotion_camembert, puis on la quantifie en int8 pour
  # réduire sa taille (~440 Mo → ~110 Mo), avant de l'uploader.
  upload-emotion:
    name: "Emotion — CamemBERT FR"
    runs-on: ubuntu-latest
    if: ${{ inputs.models == 'all' || inputs.models == 'emotion' }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install conversion tools
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet "transformers>=4.41" "optimum[exporters,onnxruntime]" sentencepiece protobuf onnx onnxruntime

      - name: Export CamemBERT emotion model to ONNX
        run: |
          set -e
          SRC="astrosbd/french_emotion_camembert"

          echo "⬇️  Export ONNX depuis $SRC (transformers + optimum)…"
          optimum-cli export onnx \
            --model "$SRC" \
            --task text-classification \
            emotion_onnx

          echo "🧾 Contenu exporté :"
          ls -la emotion_onnx

          echo "🔧 S'assure qu'un tokenizer 'fast' (tokenizer.json) est bien présent…"
          python3 - <<'PY'
          from transformers import AutoTokenizer
          tok = AutoTokenizer.from_pretrained("astrosbd/french_emotion_camembert", use_fast=True)
          tok.save_pretrained("emotion_onnx")
          print("tokenizer.json écrit :", tok.is_fast)
          PY

      - name: Quantize model to int8
        run: |
          set -e
          python3 - <<'PY'
          from optimum.onnxruntime import ORTQuantizer
          from optimum.onnxruntime.configuration import AutoQuantizationConfig

          quantizer = ORTQuantizer.from_pretrained("emotion_onnx", file_name="model.onnx")
          qconfig = AutoQuantizationConfig.avx2(is_static=False, per_channel=False)
          quantizer.quantize(save_dir="emotion_onnx_quantized", quantization_config=qconfig)
          PY

          echo "🧾 Contenu quantifié :"
          ls -la emotion_onnx_quantized

      - name: Prepare release assets
        run: |
          set -e
          mkdir -p emotion

          # Modèle quantifié (nom attendu par l'app : emotion-model.onnx)
          cp emotion_onnx_quantized/model_quantized.onnx emotion/emotion-model.onnx

          # Fichiers de tokenizer/config produits par l'export (pris dans
          # emotion_onnx, qui contient le tokenizer "fast" généré ci-dessus)
          cp emotion_onnx/tokenizer.json             emotion/emotion-tokenizer.json
          cp emotion_onnx/tokenizer_config.json      emotion/emotion-tokenizer_config.json
          cp emotion_onnx/special_tokens_map.json    emotion/emotion-special_tokens_map.json
          cp emotion_onnx/config.json                emotion/emotion-config.json

          echo "✅ Assets prêts — taille :"
          du -sh emotion/*

      - name: Upload Emotion assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ai-models-v1 \
            emotion/emotion-model.onnx \
            emotion/emotion-tokenizer.json \
            emotion/emotion-tokenizer_config.json \
            emotion/emotion-special_tokens_map.json \
            emotion/emotion-config.json \
            --repo ${{ github.repository }} \
            --clobber
          echo "✅ Emotion uploadé dans le release ai-models-v1"

  # ── Whisper Small ─────────────────────────────────────────────────────────
  upload-whisper:
    name: "Whisper — Small multilingual"
    runs-on: ubuntu-latest
    if: ${{ inputs.models == 'all' || inputs.models == 'whisper' }}
    steps:
      - name: Download Whisper Small from HuggingFace
        run: |
          BASE="https://huggingface.co/onnx-community/whisper-small/resolve/main"
          mkdir -p whisper

          echo "⬇️  encoder_model_quantized.onnx (~85 MB)…"
          wget --tries=5 --retry-connrefused --waitretry=10 \
               --timeout=120 --progress=bar:force \
               "$BASE/onnx/encoder_model_quantized.onnx" -O whisper/whisper-encoder.onnx

          echo "⬇️  decoder_model_merged_quantized.onnx (~190 MB)…"
          wget --tries=5 --retry-connrefused --waitretry=10 \
               --timeout=120 --progress=bar:force \
               "$BASE/onnx/decoder_model_merged_quantized.onnx" -O whisper/whisper-decoder.onnx

          echo "⬇️  Fichiers de configuration…"
          wget -q "$BASE/tokenizer.json"          -O whisper/whisper-tokenizer.json
          wget -q "$BASE/tokenizer_config.json"   -O whisper/whisper-tokenizer_config.json
          wget -q "$BASE/config.json"             -O whisper/whisper-config.json
          wget -q "$BASE/generation_config.json"  -O whisper/whisper-generation_config.json
          wget -q "$BASE/preprocessor_config.json" -O whisper/whisper-preprocessor_config.json
          wget -q "$BASE/special_tokens_map.json" -O whisper/whisper-special_tokens_map.json
          wget -q "$BASE/normalizer.json"         -O whisper/whisper-normalizer.json
          wget -q "$BASE/added_tokens.json"       -O whisper/whisper-added_tokens.json

          echo "✅ Whisper téléchargé — taille:"
          du -sh whisper/*

      - name: Upload Whisper assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ai-models-v1 \
            whisper/whisper-encoder.onnx \
            whisper/whisper-decoder.onnx \
            whisper/whisper-tokenizer.json \
            whisper/whisper-tokenizer_config.json \
            whisper/whisper-config.json \
            whisper/whisper-generation_config.json \
            whisper/whisper-preprocessor_config.json \
            whisper/whisper-special_tokens_map.json \
            whisper/whisper-normalizer.json \
            whisper/whisper-added_tokens.json \
            --repo ${{ github.repository }} \
            --clobber
          echo "✅ Whisper uploadé dans le release ai-models-v1"
